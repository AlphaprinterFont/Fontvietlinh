<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện Font Việt Linh</title>
    <style>
        /* =========================================
           1. KHAI BÁO BIẾN CHO GIAO DIỆN SÁNG / TỐI
           ========================================= */
        :root {
            --bg-color: #f4f4f4;
            --text-color: #202124;
            --card-bg: #ffffff;
            --border-color: #dadce0;
            --btn-bg: #e8eaed;
            --btn-text: #202124;
            --btn-active-bg: #1a73e8; 
            --btn-active-text: #ffffff;
            /* Màu chữ gradient cho tên font ở giao diện Sáng */
            --font-title-gradient: linear-gradient(90deg, #1a73e8, #ea4335);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --border-color: #3c4043;
            --btn-bg: #3c4043;
            --btn-text: #e8eaed;
            --btn-active-bg: #8ab4f8; 
            --btn-active-text: #202124;
            /* Màu chữ gradient cho tên font ở giao diện Tối (sáng hơn để dễ đọc) */
            --font-title-gradient: linear-gradient(90deg, #8ab4f8, #f28b82);
        }

        /* =========================================
           2. CSS CƠ BẢN & BỐ CỤC
           ========================================= */
        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; }

        .header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
            padding: 20px 40px; border-bottom: 1px solid var(--border-color);
            background-color: var(--card-bg); position: sticky; top: 0; z-index: 100;
        }
        
        /* CSS cho Tiêu đề Gradient và Slogan */
        .title-group {
            display: flex;
            flex-direction: column;
        }
        
        .logo-text {
            margin: 0; 
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #4285F4, #EA4335, #FBBC05, #34A853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        
        .slogan {
            font-size: 13px;
            color: #9aa0a6;
            margin-top: 4px;
            font-style: italic;
            font-weight: bold;
        }

        .header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
        }

        /* Nút trên thanh menu */
        .theme-toggle, .header-link {
            padding: 8px 16px; cursor: pointer; border: none; border-radius: 20px; 
            font-weight: bold; font-size: 13px; text-decoration: none;
            display: inline-block;
        }
        
        .theme-toggle {
            background-color: var(--text-color); color: var(--bg-color);
        }
        
        .header-link {
            background-color: var(--btn-bg); color: var(--btn-text);
        }
        
        .header-link-primary {
            background-color: var(--btn-active-bg); color: var(--btn-active-text);
        }
        
        .header-link:hover, .theme-toggle:hover { opacity: 0.8; }

        /* Khu vực nhập text và bộ lọc */
        .controls-section { padding: 20px 40px; background-color: var(--bg-color); display: flex; flex-direction: column; gap: 20px; }
        .global-input { width: 100%; padding: 15px; font-size: 18px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--card-bg); color: var(--text-color); }

        /* THANH LỌC & NÚT CHUYỂN GIAO DIỆN */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; }
        .view-toggle { display: flex; gap: 10px; }

        .filter-btn {
            padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 20px;
            background-color: var(--btn-bg); color: var(--btn-text); cursor: pointer; font-size: 14px;
        }
        .filter-btn:hover { border-color: var(--text-color); }
        .filter-btn.active { background-color: var(--btn-active-bg); color: var(--btn-active-text); border-color: transparent; font-weight: bold; }

        /* =========================================
           3. LƯỚI HIỂN THỊ CÁC FONT (GALLERY)
           ========================================= */
        .font-gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 24px; 
            padding: 0 40px 40px 40px; 
        }

        .font-gallery.list-view {
            grid-template-columns: 1fr; 
        }

        .font-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 15px; }
        
        .font-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .font-name { margin: 0; display: flex; align-items: center; gap: 10px; }
        
        /* CSS MỚI: Chỉ áp dụng màu chuyển sắc cho tên Font */
        .font-title {
            font-size: 18px;
            font-weight: 900;
            background: var(--font-title-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tag phân loại font vẫn giữ màu mặc định theo nền */
        .font-category-tag { font-weight: bold; font-size: 11px; background: var(--btn-bg); padding: 4px 10px; border-radius: 12px; color: var(--text-color); text-transform: uppercase; letter-spacing: 0.5px;}
        
        .download-btn {
            background-color: var(--btn-active-bg); color: var(--btn-active-text);
            text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: bold; border: 1px solid transparent;
        }
        .download-btn:hover { opacity: 0.8; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .preview-text { font-size: 40px; outline: none; word-wrap: break-word; min-height: 80px; padding-top: 10px; }
        .hidden { display: none !important; } 
    </style>
</head>
<body data-theme="dark">

    <header class="header">
        <div class="title-group">
            <h1 class="logo-text">Font Việt Linh</h1>
            <span class="slogan">Chữ Việt cho người Việt</span>
        </div>
        
        <div class="header-actions">
            <a href="https://www.facebook.com/FontVietLinh/" target="_blank" class="header-link header-link-primary">
                🛒 Mua Font Việt Linh
            </a>
            
            <a href="https://docs.google.com/spreadsheets/d/1FJZfdUx50TFt2mWM11f9i2Lm8f2Bsxum/edit?usp=sharing&ouid=108759078861426831168&rtpof=true&sd=true" target="_blank" class="header-link">
                📚 Bộ 4500 Font Việt Hoá
            </a>
            
            <a href="https://docs.google.com/spreadsheets/d/1LCw8ESaDGv3I9PAAimqbUHFhhIUR6CWmPdkkwObyQYY/edit?usp=sharing" target="_blank" class="header-link">
                📅 Bộ font T1-T6/2026
            </a>

            <button class="theme-toggle" id="themeBtn">Giao diện Sáng</button>
        </div>
    </header>

    <div class="controls-section">
        <input type="text" class="global-input" id="globalInput" placeholder="Gõ câu gì đó để thử tất cả các font..." value="Thiết kế thương hiệu">
        
        <div class="controls-row">
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-filter="all">Tất cả</button>
                <button class="filter-btn" data-filter="script">Script</button>
                <button class="filter-btn" data-filter="sans-serif">Sans-Serif (Không chân)</button>
                <button class="filter-btn" data-filter="serif">Serif (Có chân)</button>
                <button class="filter-btn" data-filter="display">Trang trí (Display)</button>
            </div>

            <div class="view-toggle">
                <button class="filter-btn active" id="btnGrid">⊞ Lưới</button>
                <button class="filter-btn" id="btnList">𝌸 Hàng ngang</button>
            </div>
        </div>
    </div>

    <div class="font-gallery" id="fontGallery"></div>

    <script>
        // ---------------------------------------------------------
        // KHO DỮ LIỆU FONT CỦA BẠN
        // ---------------------------------------------------------
        const myFonts = [
            { 
                name: "Bree Serif", 
                file: "VL-BreeSerif.woff2",         
                downloadFile: "VL-BreeSerif.ttf",   
                category: "serif"
            },
            { 
                name: "Belgrano", 
                file: "VL-Belgrano.woff2", 
                downloadFile: "VL-Belgrano.ttf", 
                category: "serif"
            },
            { 
                name: "McLaren", 
                file: "VL-McLaren.woff2", 
                downloadFile: "VL-McLaren.ttf",   
                category: "display"
            }
        ];

        // ---------------------------------------------------------
        // HỆ THỐNG TỰ ĐỘNG TẠO GIAO DIỆN TỪ DANH SÁCH TRÊN
        // ---------------------------------------------------------
        const gallery = document.getElementById('fontGallery');

        myFonts.forEach(font => {
            const newStyle = document.createElement('style');
            newStyle.appendChild(document.createTextNode(`
                @font-face {
                    font-family: '${font.name}';
                    src: url('fonts/${font.file}') format('woff2'),
                         url('fonts/${font.file.replace('.woff2', '.ttf')}') format('truetype');
                }
            `));
            document.head.appendChild(newStyle);

            const card = document.createElement('div');
            card.className = 'font-card';
            card.setAttribute('data-category', font.category);
            
            // ĐÃ CẬP NHẬT: Tách riêng tên font vào class .font-title
            card.innerHTML = `
                <div class="font-header">
                    <div class="font-name">
                        <span class="font-title">${font.name}</span> 
                        <span class="font-category-tag">${font.category}</span>
                    </div>
                    <a href="fonts/${font.downloadFile}" download class="download-btn">📥 Tải font này</a>
                </div>
                <div class="preview-text" style="font-family: '${font.name}'" contenteditable="true" spellcheck="false">
                    Thiết kế thương hiệu
                </div>
            `;
            gallery.appendChild(card);
        });

        // ---------------------------------------------------------
        // CÁC CHỨC NĂNG TƯƠNG TÁC & LƯU TRỮ (LOCAL STORAGE)
        // ---------------------------------------------------------
        
        const themeBtn = document.getElementById('themeBtn');
        const savedTheme = localStorage.getItem('theme') || 'dark';

        if (savedTheme === 'light') {
            document.body.removeAttribute('data-theme');
            themeBtn.innerText = 'Giao diện Tối';
        } else {
            document.body.setAttribute('data-theme', 'dark');
            themeBtn.innerText = 'Giao diện Sáng';
        }

        themeBtn.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                themeBtn.innerText = 'Giao diện Tối';
                localStorage.setItem('theme', 'light'); 
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeBtn.innerText = 'Giao diện Sáng';
                localStorage.setItem('theme', 'dark'); 
            }
        });

        const btnGrid = document.getElementById('btnGrid');
        const btnList = document.getElementById('btnList');
        const savedView = localStorage.getItem('view') || 'grid'; 

        if (savedView === 'list') {
            gallery.classList.add('list-view'); 
            btnList.classList.add('active');
            btnGrid.classList.remove('active');
        } else {
            gallery.classList.remove('list-view'); 
            btnGrid.classList.add('active');
            btnList.classList.remove('active');
        }

        btnGrid.addEventListener('click', () => {
            gallery.classList.remove('list-view'); 
            btnGrid.classList.add('active');
            btnList.classList.remove('active');
            localStorage.setItem('view', 'grid'); 
        });

        btnList.addEventListener('click', () => {
            gallery.classList.add('list-view'); 
            btnList.classList.add('active');
            btnGrid.classList.remove('active');
            localStorage.setItem('view', 'list'); 
        });

        const globalInput = document.getElementById('globalInput');
        globalInput.addEventListener('input', function() {
            const allPreviews = document.querySelectorAll('.preview-text');
            const newText = this.value || 'Gõ câu gì đó...';
            allPreviews.forEach(preview => preview.innerText = newText);
        });

        const filterBtns = document.querySelectorAll('#filterBar .filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const filterValue = btn.getAttribute('data-filter');
                const fontCards = document.querySelectorAll('.font-card');
                
                fontCards.forEach(card => {
                    if (filterValue === 'all' || filterValue === card.getAttribute('data-category')) {
                        card.classList.remove('hidden');
                    } else {
                        card.classList.add('hidden');
                    }
                });
            });
        });
    </script>
</body>
</html>
