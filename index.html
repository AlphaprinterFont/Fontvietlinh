<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện Font Việt Linh</title>
    <style>
        /* 1. KHAI BÁO BIẾN CHO GIAO DIỆN SÁNG / TỐI */
        :root {
            --bg-color: #f4f4f4;
            --text-color: #202124;
            --card-bg: #ffffff;
            --border-color: #dadce0;
            --btn-bg: #e8eaed;
            --btn-text: #202124;
            --btn-active-bg: #1a73e8; /* Màu xanh Google khi nút được chọn */
            --btn-active-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --border-color: #3c4043;
            --btn-bg: #3c4043;
            --btn-text: #e8eaed;
            --btn-active-bg: #8ab4f8; /* Màu xanh sáng cho nền tối */
            --btn-active-text: #202124;
        }

        /* 2. KHAI BÁO FONT DEMO (Nhớ đổi lại đường dẫn file của bạn) */
        @font-face { font-family: 'VietLinhThuPhap'; src: url('fonts/vl-thuphap.woff2') format('woff2'); }
        @font-face { font-family: 'VietLinhSans'; src: url('fonts/vl-sans.woff2') format('woff2'); }
        @font-face { font-family: 'VietLinhDisplay'; src: url('fonts/vl-display.woff2') format('woff2'); }

        /* 3. CSS CƠ BẢN & THANH ĐIỀU KHIỂN */
        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; border-bottom: 1px solid var(--border-color);
            background-color: var(--card-bg); position: sticky; top: 0; z-index: 100;
        }

        .theme-toggle {
            padding: 10px 20px; cursor: pointer; background-color: var(--text-color);
            color: var(--bg-color); border: none; border-radius: 20px; font-weight: bold;
        }

        /* Khu vực nhập text và bộ lọc */
        .controls-section { padding: 20px 40px; background-color: var(--bg-color); display: flex; flex-direction: column; gap: 20px; }
        .global-input { width: 100%; padding: 15px; font-size: 18px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--card-bg); color: var(--text-color); }

        /* THANH LỌC (FILTER BAR) */
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 20px;
            background-color: var(--btn-bg); color: var(--btn-text); cursor: pointer; font-size: 14px;
        }
        .filter-btn:hover { border-color: var(--text-color); }
        .filter-btn.active { background-color: var(--btn-active-bg); color: var(--btn-active-text); border-color: transparent; font-weight: bold; }

        /* 4. LƯỚI HIỂN THỊ CÁC FONT */
        .font-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; padding: 0 40px 40px 40px; }
        .font-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 15px; }
        .font-name { font-size: 14px; font-weight: bold; color: #9aa0a6; margin: 0; display: flex; justify-content: space-between; }
        .font-category-tag { font-weight: normal; font-size: 12px; background: var(--btn-bg); padding: 2px 8px; border-radius: 10px; }
        
        .preview-text { font-size: 40px; outline: none; word-wrap: break-word; min-height: 80px; }

        /* Font Classes */
        .f-thuphap { font-family: 'VietLinhThuPhap', sans-serif; }
        .f-sans { font-family: 'VietLinhSans', sans-serif; }
        .f-display { font-family: 'VietLinhDisplay', sans-serif; }

        /* Class tiện ích dùng để ẩn card khi bị lọc */
        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="dark">

    <header class="header">
        <h1 style="margin: 0; font-size: 24px;">Font Việt Linh</h1>
        <button class="theme-toggle" id="themeBtn">Chuyển sang Giao diện Sáng</button>
    </header>

    <div class="controls-section">
        <input type="text" class="global-input" id="globalInput" placeholder="Gõ câu gì đó để thử tất cả các font..." value="Thiết kế thương hiệu">
        
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="thu-phap">Thư pháp</button>
            <button class="filter-btn" data-filter="sans-serif">Sans-Serif (Không chân)</button>
            <button class="filter-btn" data-filter="serif">Serif (Có chân)</button>
            <button class="filter-btn" data-filter="display">Trang trí (Display)</button>
        </div>
    </div>

    <div class="font-gallery" id="fontGallery">
        
        <div class="font-card" data-category="thu-phap">
            <p class="font-name">Việt Linh Thư Pháp <span class="font-category-tag">Thư pháp</span></p>
            <div class="preview-text f-thuphap" contenteditable="true">Thiết kế thương hiệu</div>
        </div>

        <div class="font-card" data-category="sans-serif">
            <p class="font-name">Việt Linh Hiện Đại <span class="font-category-tag">Sans-Serif</span></p>
            <div class="preview-text f-sans" contenteditable="true">Thiết kế thương hiệu</div>
        </div>

        <div class="font-card" data-category="display">
            <p class="font-name">Việt Linh Phá Cách <span class="font-category-tag">Display</span></p>
            <div class="preview-text f-display" contenteditable="true">Thiết kế thương hiệu</div>
        </div>

    </div>

    <script>
        // 1. Chức năng Đổi màu Sáng/Tối
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                themeBtn.innerText = 'Chuyển sang Giao diện Tối';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeBtn.innerText = 'Chuyển sang Giao diện Sáng';
            }
        });

        // 2. Chức năng Cập nhật Text
        const globalInput = document.getElementById('globalInput');
        const allPreviews = document.querySelectorAll('.preview-text');
        globalInput.addEventListener('input', function() {
            const newText = this.value || 'Gõ câu gì đó...';
            allPreviews.forEach(preview => preview.innerText = newText);
        });

        // 3. CHỨC NĂNG LỌC (FILTER) FONT
        const filterBtns = document.querySelectorAll('.filter-btn');
        const fontCards = document.querySelectorAll('.font-card');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Xóa trạng thái 'active' (đang chọn) của tất cả các nút
                filterBtns.forEach(b => b.classList.remove('active'));
                // Thêm trạng thái 'active' cho nút vừa được click
                btn.classList.add('active');

                // Lấy giá trị data-filter của nút vừa click (ví dụ: 'thu-phap')
                const filterValue = btn.getAttribute('data-filter');

                // Quét qua toàn bộ các thẻ font
                fontCards.forEach(card => {
                    const cardCategory = card.getAttribute('data-category');
                    
                    // Nếu chọn "Tất cả" HOẶC category của thẻ trùng với bộ lọc -> Hiện
                    if (filterValue === 'all' || filterValue === cardCategory) {
                        card.classList.remove('hidden');
                    } else {
                        // Nếu không trùng -> Ẩn đi
                        card.classList.add('hidden');
                    }
                });
            });
        });
    </script>

</body>
</html>
