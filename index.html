<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Việt Linh | Chia sẻ Font chữ</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header-box {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: #555;
            margin: 0;
        }
        
        /* Chỉnh CSS cho danh sách các font */
        .font-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            text-align: left;
        }
        .font-card {
            background: #fff;
            padding: 25px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .font-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        
        /* Nút bấm chung */
        .btn {
            display: inline-block;
            padding: 10px 15px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            transition: background-color 0.3s ease;
        }
        .btn-download {
            background-color: #27ae60;
            color: white;
        }
        .btn-download:hover {
            background-color: #2ecc71;
        }
        
        /* Nút Facebook ở cuối trang */
        .btn-facebook {
            background-color: #1877F2;
            color: white;
            margin-top: 50px;
            display: inline-block;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-facebook:hover {
            background-color: #166FE5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h1>Font Việt Linh</h1>
            <p>Khám phá và tải về các font chữ thiết kế độc quyền. Bạn có thể chọn tải từng font riêng biệt dưới đây.</p>
        </div>

        <div class="font-grid">
            
            <div class="font-card">
                <div class="font-name">Tên Font Việt Linh 01</div>
                <a href="fonts/file-font-01.ttf" download class="btn btn-download">📥 Tải Font này</a>
            </div>

            <div class="font-card">
                <div class="font-name">Tên Font Việt Linh 02</div>
                <a href="fonts/file-font-02.otf" download class="btn btn-download">📥 Tải Font này</a>
            </div>

            <div class="font-card">
                <div class="font-name">Tên Font Việt Linh 03</div>
                <a href="fonts/file-font-03.zip" download class="btn btn-download">📥 Tải Font này</a>
            </div>
            
            </div>

        <a href="#" target="_blank" class="btn-facebook">💬 Liên Hệ Facebook</a>
    </div>

</body>
</html>
